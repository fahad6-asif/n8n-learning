<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake</title>
<style>
  :root{
    --bg:#0a0e1a; --grid:#141a2e; --snake:#39ff14; --snake2:#0affc2;
    --food:#ff2e88; --text:#e8ecff; --accent:#5e80ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:radial-gradient(circle at 50% 30%, #131a30, var(--bg));
    color:var(--text); font-family:"Segoe UI",system-ui,sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; padding:20px;
  }
  h1{font-weight:700; letter-spacing:2px; font-size:24px;
     text-shadow:0 0 12px var(--snake)}
  .hud{display:flex; gap:28px; font-size:15px; opacity:.9}
  .hud b{color:var(--snake)}
  .wrap{position:relative}
  canvas{
    background:var(--bg); border-radius:12px;
    box-shadow:0 0 0 1px #ffffff14, 0 20px 60px #0008;
  }
  .overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; text-align:center;
    background:#0a0e1acc; border-radius:12px; backdrop-filter:blur(3px);
  }
  .overlay h2{font-size:22px; text-shadow:0 0 10px var(--accent)}
  .overlay p{opacity:.8; font-size:14px; max-width:280px; line-height:1.5}
  button{
    margin-top:6px; padding:10px 22px; border:none; border-radius:8px;
    background:var(--snake); color:#04140a; font-weight:700; font-size:15px;
    cursor:pointer; box-shadow:0 0 16px #39ff1466; transition:transform .1s;
  }
  button:hover{transform:scale(1.05)}
  .hidden{display:none}
  .hint{font-size:12px; opacity:.55}
</style>
</head>
<body>
  <h1>◆ NEON SNAKE ◆</h1>
  <div class="hud">
    <span>Score <b id="score">0</b></span>
    <span>Best <b id="best">0</b></span>
  </div>
  <div class="wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">Neon Snake</h2>
      <p id="ov-text">Eat the pink dots, grow, and don't hit yourself. Arrow keys or WASD to move. On mobile, swipe.</p>
      <button id="start">Play</button>
    </div>
  </div>
  <div class="hint">Arrows / WASD to move · P to pause</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = canvas.width/CELL, ROWS = canvas.height/CELL;
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovText = document.getElementById('ov-text');
const startBtn = document.getElementById('start');

let snake, dir, nextDir, food, score, best=0, speed, loop, running, paused;

function reset(){
  snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = 120; placeFood();
  scoreEl.textContent = 0;
}

function placeFood(){
  do{
    food = {x:(Math.random()*COLS)|0, y:(Math.random()*ROWS)|0};
  } while(snake.some(s=>s.x===food.x && s.y===food.y));
}

function tick(){
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // wall or self collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||
     snake.some(s=>s.x===head.x&&s.y===head.y)){
    return gameOver();
  }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score++; scoreEl.textContent = score;
    placeFood();
    if(speed>60) speed -= 3, restartLoop();
  } else {
    snake.pop();
  }
  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle = '#141a2e';
  ctx.lineWidth = 1;
  for(let i=1;i<COLS;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(canvas.width,i*CELL);ctx.stroke();
  }
  // food
  ctx.save();
  ctx.shadowColor='#ff2e88'; ctx.shadowBlur=16; ctx.fillStyle='#ff2e88';
  const fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2;
  ctx.beginPath(); ctx.arc(fx,fy,CELL/2-2,0,7); ctx.fill();
  ctx.restore();
  // snake
  snake.forEach((s,i)=>{
    const t = i/snake.length;
    ctx.save();
    ctx.shadowColor='#39ff14'; ctx.shadowBlur = i===0?18:8;
    ctx.fillStyle = i===0 ? '#0affc2' : `rgb(${57-t*30},${255-t*120},${20})`;
    const pad = i===0?2:3;
    roundRect(s.x*CELL+pad, s.y*CELL+pad, CELL-pad*2, CELL-pad*2, 5);
    ctx.fill();
    ctx.restore();
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function restartLoop(){
  clearInterval(loop);
  loop = setInterval(()=>{ if(!paused) tick(); }, speed);
}

function startGame(){
  reset(); running=true; paused=false;
  overlay.classList.add('hidden');
  draw(); restartLoop();
}

function gameOver(){
  clearInterval(loop); running=false;
  best = Math.max(best, score); bestEl.textContent = best;
  ovTitle.textContent = 'Game Over';
  ovText.textContent = `You scored ${score}. ` + (score>=15?'Impressive!':'Try again?');
  startBtn.textContent = 'Play Again';
  overlay.classList.remove('hidden');
}

startBtn.addEventListener('click', startGame);

const KEYMAP = {
  ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
  w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]
};
document.addEventListener('keydown', e=>{
  if(e.key==='p'||e.key==='P'){ if(running) paused=!paused; return; }
  const k = KEYMAP[e.key];
  if(!k) return;
  e.preventDefault();
  const [x,y]=k;
  if(x===-dir.x && y===-dir.y) return; // no reverse
  nextDir = {x,y};
});

// swipe controls
let tsx,tsy;
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tsx=t.clientX;tsy=t.clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const t=e.changedTouches[0], dx=t.clientX-tsx, dy=t.clientY-tsy;
  let nd;
  if(Math.abs(dx)>Math.abs(dy)) nd={x:dx>0?1:-1,y:0}; else nd={x:0,y:dy>0?1:-1};
  if(nd.x===-dir.x && nd.y===-dir.y) return;
  nextDir=nd;
},{passive:true});

reset(); draw();
</script>
</body>
</html>
